<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Diagnostic</title>
    
    <!-- Critical CSS to prevent blank page while Tailwind loads -->
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; margin: 0; padding: 20px; color: #1e293b; display: flex; justify-content: center; }
        .loading-fallback { text-align: center; margin-top: 50px; }
        .hidden { display: none !important; }
        #app-container { max-width: 48rem; width: 100%; opacity: 0; transition: opacity 0.3s ease; }
        #app-container.ready { opacity: 1; }
    </style>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>

    <!-- Fallback message in case JS fails -->
    <noscript>
        <div class="loading-fallback">
            <h1>JavaScript Required</h1>
            <p>Please enable JavaScript to run this diagnostic.</p>
        </div>
    </noscript>

    <div id="app-container">
        
        <!-- INTRO SCREEN -->
        <div id="intro-screen" class="bg-white rounded-2xl shadow-xl p-8 md:p-12 text-center mt-10">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center">
                    <i data-lucide="shield" class="w-10 h-10 text-indigo-600"></i>
                </div>
            </div>
            <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-4">The Character Diagnostic</h1>
            <p class="text-lg text-slate-600 mb-8 max-w-xl mx-auto leading-relaxed">
                Character is revealed when things get messy. Be completely honest—there are no wrong answers, only insights into your blind spots.
            </p>
            <button id="start-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-full text-lg transition-all shadow-lg inline-flex items-center">
                Begin Diagnostic <i data-lucide="chevron-right" class="ml-2 w-5 h-5"></i>
            </button>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" class="hidden mt-4">
            <div class="mb-8">
                <div class="flex justify-between text-sm font-medium text-slate-500 mb-2">
                    <span id="progress-text">Scenario 1</span>
                    <span id="progress-percentage">0%</span>
                </div>
                <div class="w-full bg-slate-200 rounded-full h-2.5">
                    <div id="progress-bar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-6 md:p-10" id="question-card">
                <h2 id="scenario-text" class="text-xl md:text-2xl font-medium text-slate-800 mb-8 leading-snug"></h2>
                <div id="options-container" class="space-y-4"></div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div id="results-screen" class="hidden mt-4">
            <div class="text-center mb-10">
                <h1 class="text-3xl md:text-4xl font-bold text-slate-900 mb-4">Diagnostic Complete</h1>
                <p class="text-lg text-slate-600">Your primary "Construction Zones":</p>
            </div>
            <div id="focus-areas-container" class="space-y-6 mb-12"></div>
            <div id="other-areas-container" class="space-y-4 mb-12"></div>
            <div class="text-center pb-20">
                <button id="retake-btn" class="text-slate-500 hover:text-indigo-600 font-medium inline-flex items-center">
                    <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> Retake Diagnostic
                </button>
            </div>
        </div>

    </div>

    <script>
        (function() {
            // Data and Configuration
            const toolkitData = [
                { id: "Honest", title: "1. Honest", shortfall: "Selective truth-telling or 'polite' deception.", redFlag: "You find yourself 'massaging' details so you don't look bad.", mirrorQuestion: "Did I leave out information today to manage someone's opinion of me?" },
                { id: "Honoring", title: "2. Honoring / Respectful", shortfall: "Conditional respect.", redFlag: "You speak dismissively about people when they aren't around.", mirrorQuestion: "How do I treat people who can do absolutely nothing for me?" },
                { id: "Ownership", title: "3. Extreme Ownership", shortfall: "The 'Yes, but...' defense.", redFlag: "Your first thought is to explain external factors when a mistake happens.", mirrorQuestion: "Did I lead with an apology or an explanation?" },
                { id: "Humble", title: "4. Humble", shortfall: "Self-promotion.", redFlag: "You feel resentment when someone else is praised for something you also did.", mirrorQuestion: "Can I be genuinely happy for others' success without mentioning mine?" },
                { id: "Empathetic", title: "5. Empathetic", shortfall: "Logic-first responding.", redFlag: "Thinking 'They brought this on themselves' instead of 'That must be hard.'", mirrorQuestion: "Am I listening to understand or listening to solve?" },
                { id: "Consistent", title: "6. Consistent", shortfall: "'Chameleon' syndrome.", redFlag: "Your values shift depending on which social group you are with.", mirrorQuestion: "Would all my different friend groups recognize me as the same person?" },
                { id: "Safe", title: "7. Safe", shortfall: "Unpredictability or 'sharp edges.'", redFlag: "People hesitate to give you bad news.", mirrorQuestion: "Do people feel smaller or larger after they spend time with me?" },
                { id: "Empowering", title: "8. Empowering", shortfall: "Micromanaging.", redFlag: "You prefer to 'just do it yourself' because it's faster.", mirrorQuestion: "Am I creating followers or leaders?" },
                { id: "Responds", title: "9. Responds, Not Reacts", shortfall: "Thin-skinned emotions.", redFlag: "You feel immediate physical 'heat' and need to snap back.", mirrorQuestion: "Do I take a breath to choose my words, or let my mood choose them?" },
                { id: "Flexible", title: "10. Flexible / Collaborative", shortfall: "'My way or the highway' thinking.", redFlag: "Viewing compromise as a 'loss.'", mirrorQuestion: "How often do I actually adopt someone else's idea?" },
                { id: "Loving", title: "11. Loving", shortfall: "Latent bitterness.", redFlag: "Categorizing certain people as 'the enemy.'", mirrorQuestion: "Am I actively seeking the good of those I find difficult?" },
                { id: "LowQuarrels", title: "12. Low on Quarrels", shortfall: "Being 'right' over being 'related.'", redFlag: "Engaging in debates that don't truly matter.", mirrorQuestion: "Is this issue worth damaging the relationship?" }
            ];

            const questionsData = [
                { trait: "Honest", scenario: "You missed a deadline. Your boss asks for a status update.", options: [{text: "Admit you forgot and provide a realistic timeline.", points: 0}, {text: "Say you were waiting on someone else's input.", points: 3}, {text: "Give a vague 'almost done' update.", points: 2}] },
                { trait: "Honoring", scenario: "A server is overwhelmed and messes up your order twice.", options: [{text: "Politely point it out and assure them no rush.", points: 0}, {text: "Complain loudly to your partner.", points: 2}, {text: "Leave a bad tip to 'teach a lesson.'", points: 3}] },
                { trait: "Ownership", scenario: "A project you led receives negative feedback.", options: [{text: "Take full responsibility and outline the fix.", points: 0}, {text: "Explain how team members dropped the ball.", points: 3}, {text: "Accept it but privately blame the deadline.", points: 1}] },
                { trait: "Humble", scenario: "Boss praises only you for a team effort.", options: [{text: "Immediately highlight colleague contributions.", points: 0}, {text: "Accept the praise silently.", points: 2}, {text: "Use the moment to ask for a raise.", points: 3}] },
                { trait: "Empathetic", scenario: "A friend is crying about a breakup you predicted.", options: [{text: "Listen quietly and offer support.", points: 0}, {text: "Say 'I told you so.'", points: 3}, {text: "Start giving logic-based advice.", points: 2}] },
                { trait: "Safe", scenario: "A junior member admits a massive error to you.", options: [{text: "Focus on finding a solution together.", points: 0}, {text: "Blow up and threaten their job security.", points: 3}, {text: "Sigh and roll your eyes.", points: 2}] },
                { trait: "Responds", scenario: "You receive a rudely worded email critiquing your work.", options: [{text: "Step away and reply calmly later.", points: 0}, {text: "Type an angry reply and hit send.", points: 3}, {text: "Reply with passive-aggressive remarks.", points: 2}] },
                { trait: "Consistent", scenario: "A group is mocking beliefs you privately hold.", options: [{text: "Politely state you see it differently.", points: 0}, {text: "Join in the mocking to fit in.", points: 3}, {text: "Stay silent but feel uncomfortable.", points: 1}] },
                { trait: "Flexible", scenario: "The team chooses a strategy you argued against.", options: [{text: "Commit fully to making it work.", points: 0}, {text: "Say 'I told you so' when it hits a snag.", points: 3}, {text: "Do only the bare minimum.", points: 2}] },
                { trait: "Loving", scenario: "A public figure you dislike suffers a personal tragedy.", options: [{text: "Feel human compassion for their suffering.", points: 0}, {text: "Post that 'karma caught up.'", points: 3}, {text: "Feel secretly glad.", points: 2}] },
                { trait: "LowQuarrels", scenario: "Someone posts misinformation on social media.", options: [{text: "Scroll past it.", points: 0}, {text: "Write a 5-paragraph rebuttal.", points: 3}, {text: "Post a passive-aggressive meme.", points: 2}] },
                { trait: "Empowering", scenario: "New employee is struggling with a task.", options: [{text: "Guide them so they learn it.", points: 0}, {text: "Take the tools and say 'Just watch me.'", points: 3}, {text: "Tell the boss they aren't cut out for it.", points: 2}] }
            ];

            let state = {
                currentQIndex: 0,
                scores: {},
                activeQuestions: []
            };

            function init() {
                const container = document.getElementById('app-container');
                container.classList.add('ready');

                document.getElementById('start-btn').addEventListener('click', startQuiz);
                document.getElementById('retake-btn').addEventListener('click', startQuiz);
                
                if (window.lucide) window.lucide.createIcons();
            }

            function startQuiz() {
                state.activeQuestions = [...questionsData].sort(() => Math.random() - 0.5);
                state.currentQIndex = 0;
                state.scores = {};
                
                showScreen('quiz-screen');
                renderQuestion();
            }

            function showScreen(id) {
                ['intro-screen', 'quiz-screen', 'results-screen'].forEach(s => {
                    document.getElementById(s).classList.add('hidden');
                });
                document.getElementById(id).classList.remove('hidden');
            }

            function renderQuestion() {
                const q = state.activeQuestions[state.currentQIndex];
                const pct = Math.round(((state.currentQIndex + 1) / state.activeQuestions.length) * 100);
                
                document.getElementById('progress-text').innerText = `Scenario ${state.currentQIndex + 1}`;
                document.getElementById('progress-percentage').innerText = `${pct}%`;
                document.getElementById('progress-bar').style.width = `${pct}%`;
                document.getElementById('scenario-text').innerText = q.scenario;

                const container = document.getElementById('options-container');
                container.innerHTML = '';

                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-4 border-2 border-slate-100 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition-all font-medium text-slate-700";
                    btn.innerText = opt.text;
                    btn.addEventListener('click', () => {
                        state.scores[q.trait] = (state.scores[q.trait] || 0) + opt.points;
                        if (state.currentQIndex < state.activeQuestions.length - 1) {
                            state.currentQIndex++;
                            renderQuestion();
                        } else {
                            showResults();
                        }
                    });
                    container.appendChild(btn);
                });
            }

            function showResults() {
                showScreen('results-screen');
                const sorted = Object.entries(state.scores).sort((a,b) => b[1] - a[1]);
                const top3 = sorted.slice(0, 3).map(x => x[0]);

                const focusHtml = toolkitData.filter(t => top3.includes(t.id)).map(t => `
                    <div class="bg-white border-l-4 border-rose-500 shadow-sm p-6 rounded-r-xl">
                        <h3 class="text-xl font-bold mb-2">${t.title}</h3>
                        <p class="text-rose-800 font-bold text-xs uppercase mb-1">Shortfall</p>
                        <p class="mb-4 text-slate-700">${t.shortfall}</p>
                        <div class="bg-slate-800 text-white p-4 rounded-lg">
                            <p class="text-indigo-300 font-bold text-xs uppercase mb-1">Mirror Question</p>
                            <p class="italic text-sm">"${t.mirrorQuestion}"</p>
                        </div>
                    </div>
                `).join('');

                document.getElementById('focus-areas-container').innerHTML = focusHtml;
                if (window.lucide) window.lucide.createIcons();
            }

            // Start everything
            if (document.readyState === 'complete') init();
            else window.addEventListener('load', init);

        })();
    </script>
</body>
</html>
